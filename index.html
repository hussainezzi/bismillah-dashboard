<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bismillah Traders — Financial Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; color: #1a1a2e; }
.header { background: linear-gradient(135deg, #1a5276, #2e86c1); color: white; padding: 25px 0; text-align: center; }
.header h1 { font-size: 28px; margin-bottom: 5px; }
.header .sub { font-size: 14px; opacity: 0.85; }
.container { max-width: 1200px; margin: 0 auto; padding: 20px; }
.summary-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-bottom: 25px; }
.card { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); text-align: center; }
.card .label { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 5px; }
.card .value { font-size: 24px; font-weight: 700; }
.card .value.green { color: #27ae60; }
.card .value.red { color: #e74c3c; }
.card .value.blue { color: #2980b9; }
.card .value.orange { color: #e67e22; }
.section-title { font-size: 18px; font-weight: 600; margin: 25px 0 12px; color: #2c3e50; border-bottom: 2px solid #2e86c1; padding-bottom: 6px; }
.chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
.chart-box { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.chart-box h3 { font-size: 14px; color: #555; margin-bottom: 12px; }
table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 20px; }
th { background: #2c3e50; color: white; padding: 10px 12px; text-align: left; font-size: 13px; }
td { padding: 8px 12px; border-bottom: 1px solid #eee; font-size: 13px; }
tr:hover { background: #f8f9fa; }
.amt { text-align: right; font-family: 'Courier New', monospace; font-weight: 600; }
.amt.pos { color: #27ae60; }
.amt.neg { color: #e74c3c; }
.total-row { background: #eaf2f8; font-weight: 700; }
.tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; margin: 1px; }
.tag.income { background: #d5f5e3; color: #1e8449; }
.tag.expense { background: #fadbd8; color: #922b21; }
.tag.receivable { background: #d6eaf8; color: #1a5276; }
.tag.payable { background: #f5eef8; color: #76448a; }
.footer { text-align: center; padding: 20px; font-size: 11px; color: #999; }
@media (max-width: 768px) { .chart-row { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="header">
  <h1>📊 Bismillah Traders</h1>
  <div class="sub">Financial Dashboard · Dec 1, 2025 — May 23, 2026</div>
</div>

<div class="container" id="app"></div>

<div class="footer">Data sourced from Odoo ERP · Automatically refreshed</div>

<script>
const fmt = (n) => {
  if (n === undefined || n === null) return '—';
  const parts = Math.abs(n).toFixed(2).split('.');
  const intPart = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  return (n < 0 ? '-' : '') + 'Rs. ' + intPart + '.' + parts[1];
};

const fmtShort = (n) => {
  const abs = Math.abs(n);
  if (abs >= 10000000) return 'Rs. ' + (abs / 10000000).toFixed(2) + ' Cr';
  if (abs >= 100000) return 'Rs. ' + (abs / 100000).toFixed(2) + ' L';
  if (abs >= 1000) return 'Rs. ' + (abs / 1000).toFixed(1) + ' K';
  return fmt(n);
};

fetch('data.json').then(r => r.json()).then(d => {
  const { summary, income, expenses, receivables, payables, monthly_income } = d;
  const app = document.getElementById('app');

  // Summary Cards
  app.innerHTML = `
    <div class="summary-cards">
      <div class="card"><div class="label">Total Income</div><div class="value green">${fmt(summary.total_income)}</div></div>
      <div class="card"><div class="label">Total Expenses</div><div class="value red">${fmt(summary.total_expenses)}</div></div>
      <div class="card"><div class="label">Net Profit</div><div class="value blue">${fmt(summary.net_profit)}</div></div>
      <div class="card"><div class="label">Receivable (Open)</div><div class="value orange">${fmt(receivables.total)}</div></div>
    </div>

    <div class="chart-row">
      <div class="chart-box"><h3>📈 Income vs Expenses</h3><canvas id="pieChart"></canvas></div>
      <div class="chart-box"><h3>📊 Monthly Income Trend</h3><canvas id="barChart"></canvas></div>
    </div>

    <div class="section-title">💰 Income Breakdown</div>
    <div id="incomeTable"></div>

    <div class="section-title">📉 Expenses Breakdown</div>
    <div id="expenseTable"></div>

    <div class="section-title">📋 Receivables (Customer Outstanding)</div>
    <div id="receivableTable"></div>

    <div class="section-title">💳 Payables (Vendor Outstanding)</div>
    <div id="payableTable"></div>
  `;

  // Pie Chart
  new Chart(document.getElementById('pieChart'), {
    type: 'doughnut',
    data: {
      labels: ['Income', 'Expenses'],
      datasets: [{ data: [summary.total_income, summary.total_expenses], backgroundColor: ['#27ae60', '#e74c3c'] }]
    },
    options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
  });

  // Bar Chart - Monthly
  const months = Object.keys(monthly_income).sort();
  new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: {
      labels: months,
      datasets: [{ label: 'Monthly Income', data: months.map(m => monthly_income[m]), backgroundColor: '#2980b9' }]
    },
    options: { responsive: true, plugins: { legend: { display: false } },
      scales: { y: { ticks: { callback: v => 'Rs. ' + v.toLocaleString() } } } }
  });

  // Income Table
  const incomeContainer = document.getElementById('incomeTable');
  let incomeHtml = '<table><tr><th>Account</th><th>Partner</th><th>Date</th><th>Amount (Rs.)</th></tr>';
  income.forEach(acct => {
    let net = 0;
    acct.details.forEach(t => net += t.amt);
    incomeHtml += `<tr class="total-row"><td>${acct.code} ${acct.name}</td><td></td><td></td><td class="amt pos">${fmt(acct.total)}</td></tr>`;
    acct.details.forEach(t => {
      incomeHtml += `<tr><td></td><td>${t.partner}</td><td>${t.date}</td><td class="amt ${t.amt >= 0 ? 'pos' : 'neg'}">${fmt(t.amt)}</td></tr>`;
    });
  });
  incomeHtml += `<tr class="total-row"><td><strong>TOTAL INCOME</strong></td><td></td><td></td><td class="amt pos">${fmt(summary.total_income)}</td></tr></table>`;
  incomeContainer.innerHTML = incomeHtml;

  // Expense Table
  const expenseContainer = document.getElementById('expenseTable');
  let expenseHtml = '<table><tr><th>Account</th><th>Partner</th><th>Date</th><th>Amount (Rs.)</th></tr>';
  expenses.forEach(acct => {
    expenseHtml += `<tr class="total-row"><td>${acct.code} ${acct.name}</td><td></td><td></td><td class="amt neg">${fmt(acct.total)}</td></tr>`;
    acct.details.forEach(t => {
      expenseHtml += `<tr><td></td><td>${t.partner}</td><td>${t.date}</td><td class="amt neg">${fmt(t.amt)}</td></tr>`;
    });
  });
  expenseHtml += `<tr class="total-row"><td><strong>TOTAL EXPENSES</strong></td><td></td><td></td><td class="amt neg">${fmt(summary.total_expenses)}</td></tr></table>`;
  expenseContainer.innerHTML = expenseHtml;

  // Receivables Table
  const recvContainer = document.getElementById('receivableTable');
  let recvHtml = '<table><tr><th>Customer</th><th>Invoice</th><th>Date</th><th>Balance (Rs.)</th></tr>';
  receivables.items.filter(i => i.balance >= 0).forEach(i => {
    recvHtml += `<tr><td>${i.partner}</td><td>${i.invoice || '—'}</td><td>${i.date}</td><td class="amt pos">${fmt(i.balance)}</td></tr>`;
  });
  recvHtml += `<tr class="total-row"><td><strong>TOTAL RECEIVABLE</strong></td><td></td><td></td><td class="amt pos">${fmt(receivables.total)}</td></tr></table>`;
  recvContainer.innerHTML = recvHtml;

  // Payables Table
  const payContainer = document.getElementById('payableTable');
  let payHtml = '<table><tr><th>Vendor</th><th>Invoice</th><th>Date</th><th>Balance (Rs.)</th></tr>';
  payables.items.filter(i => i.balance <= 0).forEach(i => {
    payHtml += `<tr><td>${i.partner}</td><td>${i.ref || '—'}</td><td>${i.date}</td><td class="amt neg">${fmt(i.balance)}</td></tr>`;
  });
  payHtml += `<tr class="total-row"><td><strong>TOTAL PAYABLE</strong></td><td></td><td></td><td class="amt neg">${fmt(Math.abs(payables.total))}</td></tr></table>`;
  payContainer.innerHTML = payHtml;
});
</script>
</body>
</html>
